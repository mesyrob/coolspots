apiVersion: apps/v1
kind: Deployment
metadata:
  name: coolspots
  namespace: coolspots
spec:
  replicas: 1
  strategy:
    type: Recreate  # SQLite-backed; do not run two pods simultaneously
  selector:
    matchLabels:
      app: coolspots
  template:
    metadata:
      labels:
        app: coolspots
    spec:
      containers:
        - name: pocketbase
          image: ghcr.io/muchobien/pocketbase:0.22.20
          # The muchobien image's ENTRYPOINT already runs `pocketbase serve` with
          # default --dir=/pb_data, --publicDir=/pb_public, etc. Don't re-pass
          # those. Only supply additional flags here (and override with caution).
          args:
            - "--migrationsDir=/pb_migrations"
            # CORS allowlist — edit to match your real frontend origins.
            - "--origins=https://coolspots.vercel.app,http://localhost:8000,http://localhost:7311"
          ports:
            - name: http
              containerPort: 8090
          volumeMounts:
            - name: data
              mountPath: /pb_data
            - name: public
              mountPath: /pb_public
            - name: migrations
              mountPath: /pb_migrations
            - name: hooks
              mountPath: /pb_hooks
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: coolspots-data
        - name: public
          configMap:
            name: coolspots-public
        - name: migrations
          configMap:
            name: coolspots-migrations
        - name: hooks
          configMap:
            name: coolspots-hooks
