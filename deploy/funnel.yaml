# Tailscale Funnel sidecar that exposes the PocketBase service to the public
# internet at https://<hostname>.<your-tailnet>.ts.net. No port forwarding,
# automatic TLS, free for personal use.
#
# Setup (one-time):
#   1. In the Tailscale admin console (https://login.tailscale.com/admin/settings/keys),
#      generate a reusable auth key. Or better: an OAuth client with `device` scope.
#   2. Create the Secret in your cluster (do NOT commit the key):
#        kubectl -n coolspots create secret generic tailscale-auth \
#          --from-literal=TS_AUTHKEY='tskey-auth-XXXX...'
#   3. In https://login.tailscale.com/admin/dns enable HTTPS certificates and Funnel
#      for your tailnet, and add the device tag mapping if you use ACL tags.
#
# After apply: the funnel pod joins your tailnet as a device named "coolspots"
# (configurable via TS_HOSTNAME). Visit https://coolspots.<tailnet>.ts.net to
# verify — it should proxy to the in-cluster PocketBase service.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: coolspots-funnel
  namespace: coolspots
spec:
  replicas: 1
  serviceName: coolspots-funnel
  selector:
    matchLabels:
      app: coolspots-funnel
  template:
    metadata:
      labels:
        app: coolspots-funnel
    spec:
      containers:
        - name: tailscale
          image: tailscale/tailscale:v1.74.1
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_HOSTNAME
              value: coolspots
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_USERSPACE
              value: "true"  # no NET_ADMIN cap needed
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false --ssh=false"
            # Funnel routes:  external 443  ->  in-cluster service :80
            - name: TS_SERVE_CONFIG
              value: /etc/ts-serve.json
          volumeMounts:
            - name: state
              mountPath: /var/lib/tailscale
            - name: ts-config
              mountPath: /etc
          securityContext:
            runAsNonRoot: false
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: ts-config
          configMap:
            name: coolspots-funnel-config
  volumeClaimTemplates:
    - metadata:
        name: state
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 64Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coolspots-funnel-config
  namespace: coolspots
data:
  ts-serve.json: |
    {
      "TCP": { "443": { "HTTPS": true } },
      "Web": {
        "${TS_CERT_DOMAIN}:443": {
          "Handlers": { "/": { "Proxy": "http://coolspots.coolspots.svc.cluster.local:80" } }
        }
      },
      "AllowFunnel": { "${TS_CERT_DOMAIN}:443": true }
    }
