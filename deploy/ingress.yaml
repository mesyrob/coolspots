apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coolspots
  namespace: coolspots
  annotations:
    # PocketBase realtime / file uploads can need a bit more breathing room
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: coolspots.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coolspots
                port:
                  number: 80
